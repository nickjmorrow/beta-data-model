version: 1
type: view
name: people_pulse_ticket
model_name: pure_organics
sql_table_name: '"DEMO_PROD_PEOPLE_PULSE"."PEOPLE_PULSE_TICKET"'
fields:
- name: customer_id
  sql: ${TABLE}."CUSTOMER_ID"
  field_type: dimension
  type: number
- name: ticket_date
  sql: ${TABLE}."TICKET_DATE"
  field_type: dimension_group
  type: time
  timeframes:
  - raw
  - date
  - day_of_year
  - week
  - week_of_year
  - month
  - month_of_year
  - quarter
  - year
  datatype: date
- name: issue_type
  sql: ${TABLE}."ISSUE_TYPE"
  field_type: dimension
  type: string
  searchable: true
- name: customer_satisfaction_score
  sql: ${TABLE}."CUSTOMER_SATISFACTION_SCORE"
  field_type: dimension
  type: number
- name: creator_id
  sql: ${TABLE}."CREATOR_ID"
  field_type: dimension
  type: number
- name: resolution_time
  sql: ${TABLE}."RESOLUTION_TIME"
  field_type: dimension
  type: number
- name: assignee_id
  sql: ${TABLE}."ASSIGNEE_ID"
  field_type: dimension
  type: number
- name: ticket_id
  sql: ${TABLE}."TICKET_ID"
  field_type: dimension
  type: number
default_date: ticket_date
